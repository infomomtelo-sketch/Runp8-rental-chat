<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>List your rental | RunP8</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(to bottom, #ffffff, #f3f4f6);
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 26px;
  margin-bottom: 6px;
}

.sub {
  color: #555;
  margin-bottom: 18px;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: #0b1120;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.preview {
  display: none;
  margin-top: 12px;
}

iframe {
  width: 100%;
  height: 200px;
  border: 0;
  border-radius: 12px;
}

.note {
  margin-top: 16px;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

<h1>List your rental</h1>
<div class="sub">No upfront cost. You only pay when a tenant is placed.</div>

<input id="address" placeholder="Full address">
<input id="city" placeholder="City">

<select id="state">
  <option value="">State</option>
  <option>CA</option>
  <option>TX</option>
  <option>NV</option>
</select>

<input id="zip" placeholder="ZIP code">

<button onclick="loadMap()">Preview location</button>

<div class="preview" id="mapBox"></div>

<input id="rent" type="number" placeholder="Monthly rent">
<input id="date" type="date">

<select id="type">
  <option value="">Property type</option>
  <option>Apartment</option>
  <option>House</option>
  <option>Studio</option>
  <option>Room</option>
</select>

<select id="beds">
  <option value="">Beds / baths</option>
  <option>Studio</option>
  <option>1 bed / 1 bath</option>
  <option>2 bed / 1 bath</option>
  <option>2 bed / 2 bath</option>
  <option>3+ bed</option>
</select>

<select id="pets">
  <option value="">Pet policy</option>
  <option>No pets</option>
  <option>Cats allowed</option>
  <option>Dogs allowed</option>
</select>

<select id="parking">
  <option value="">Parking</option>
  <option>Yes</option>
  <option>No</option>
  <option>Street</option>
</select>

<select id="laundry">
  <option value="">Laundry</option>
  <option>In-unit</option>
  <option>On-site</option>
  <option>None</option>
</select>

<textarea id="notes" placeholder="Additional details (optional)"></textarea>

<button onclick="submitForm()">Submit listing</button>

<div class="note">
We keep it simple:
• No application fee  
• No deposit  
• Qualified renters only  
</div>

</div>

<script>
function loadMap() {
  const address = document.getElementById("address").value;
  const city = document.getElementById("city").value;
  const state = document.getElementById("state").value;
  const zip = document.getElementById("zip").value;

  const full = encodeURIComponent(address + "," + city + "," + state + " " + zip);

  document.getElementById("mapBox").style.display = "block";
  document.getElementById("mapBox").innerHTML =
    `<iframe src="https://www.google.com/maps?q=${full}&output=embed"></iframe>`;
}

function submitForm() {

  const address = document.getElementById("address");
  const city = document.getElementById("city");
  const state = document.getElementById("state");
  const zip = document.getElementById("zip");

  const rent = document.getElementById("rent");
  const date = document.getElementById("date");
  const type = document.getElementById("type");
  const beds = document.getElementById("beds");
  const pets = document.getElementById("pets");
  const parking = document.getElementById("parking");
  const laundry = document.getElementById("laundry");
  const notes = document.getElementById("notes");

  const body = `
Address: ${address.value}
City: ${city.value}
State: ${state.value}
ZIP: ${zip.value}

Rent: ${rent.value}
Date: ${date.value}
Type: ${type.value}
Beds: ${beds.value}
Pets: ${pets.value}
Parking: ${parking.value}
Laundry: ${laundry.value}

Notes: ${notes.value}
`;

  window.location.href =
    "mailto:owners@runp8.com?subject=New Listing&body=" + encodeURIComponent(body);
}
</script>

</body>
</html>
