<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RunP8 Rental</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(to bottom, #ffffff, #f1f5f9);
  color: #111827;
}

.app {
  max-width: 520px;
  margin: auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.topbar {
  padding: 16px 18px 10px;
  background: #ffffff;
  border-bottom: 1px solid #e5e7eb;
}

.logo {
  font-size: 18px;
  font-weight: 600;
}

.subtext {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 2px;
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.msg {
  margin-bottom: 14px;
  max-width: 88%;
  padding: 14px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.5;
  white-space: pre-line;
}

.bot {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-bottom-left-radius: 6px;
}

.user {
  background: #111827;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 6px;
}

/* BUTTONS */
.choices {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}

button {
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  background: white;
  cursor: pointer;
  font-size: 14px;
}

/* Primary button */
.primary {
  background: #111827;
  color: white;
  border: none;
}

button:hover {
  opacity: 0.9;
}

/* CARE CARD */
.care {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 14px;
  margin: 10px 0 16px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="app">

  <div class="topbar">
    <div class="logo">RunP8</div>
    <div class="subtext">Helping you find a place, simply</div>
  </div>

  <div id="chat" class="chat"></div>

</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, type="bot") {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addChoices(options) {
  const wrap = document.createElement("div");
  wrap.className = "choices";

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt.label;

    if (opt.primary) btn.classList.add("primary");

    btn.onclick = () => {
      addMsg(opt.label, "user");
      wrap.remove();
      opt.action();
    };

    wrap.appendChild(btn);
  });

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function careMessage(next) {
  const div = document.createElement("div");
  div.className = "care";
  div.innerText =
`We know finding a place to rent isn’t easy.

• No application fee
• No deposit
• First month + last month only

Take your time — we’ll help when you're ready.`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(next, 600);
}

/* START */

function start() {
  addMsg(
`123 Main St
2 bed · 1 bath

$1,200 / month
Move-in: $2,400
(First + last, no deposit)

Available now
No pets`
  );

  addChoices([
    { label: "Start move-in", primary: true, action: moveInNow },
    { label: "Schedule showing", action: showingDay },
    { label: "See if you qualify", action: requirements },
    { label: "Ask about this home", action: ask }
  ]);
}

/* REQUIREMENTS */

function requirements() {
  addMsg(
`To qualify:

• Valid ID
• Proof of income

No application fee.
No deposit required.`
  );

  addChoices([
    { label: "Apply now", primary: true, action: apply },
    { label: "View other options", action: exitFlow }
  ]);
}

/* APPLY */

function apply() {
  addMsg("Do you have ID and income proof?");

  addChoices([
    { label: "Yes", primary: true, action: approved },
    { label: "Not yet", action: exitFlow }
  ]);
}

/* APPROVED */

function approved() {
  addMsg(
`You're approved 🎉

First month: $1,200
Last month: $1,200

Total: $2,400`
  );

  addChoices([
    { label: "Pay now", primary: true, action: payment },
    { label: "View other options", action: exitFlow }
  ]);
}

/* PAYMENT */

function payment() {
  addMsg("Payment received ✅");

  addMsg(
`Before move-in:

• Property condition will be checked
• Agreement will be signed

This protects both you and the property.`
  );

  addChoices([
    { label: "Continue", primary: true, action: moveIn }
  ]);
}

/* MOVE IN */

function moveIn() {
  addMsg(
`You're all set 🎉

Move-in details:

📍 123 Main St
🔑 Access code sent on move-in day
🕒 After 3PM

Welcome home.`
  );
}

/* MOVE IN NOW */

function moveInNow() {
  addMsg("Let’s get you moved in 👍");
  approved();
}

/* SHOWING */

function showingDay() {
  addMsg("When would you like to see it?");

  addChoices([
    { label: "Friday", action: showingTime },
    { label: "Saturday", action: showingTime },
    { label: "Sunday", action: showingTime }
  ]);
}

function showingTime() {
  addMsg("What time works best?");

  addChoices([
    { label: "Morning", action: showingPeople },
    { label: "Afternoon", action: showingPeople },
    { label: "Evening", action: showingPeople }
  ]);
}

function showingPeople() {
  addMsg("How many people?");

  addChoices([
    { label: "Just me", action: showingConfirm },
    { label: "2 people", action: showingConfirm },
    { label: "3+ people", action: showingConfirm }
  ]);
}

function showingConfirm() {
  addMsg("You're scheduled 🎉");

  addChoices([
    { label: "Apply now", primary: true, action: apply },
    { label: "View other options", action: exitFlow }
  ]);
}

/* EXIT FLOW */

function exitFlow() {
  careMessage(() => {
    addChoices([
      { label: "View listings", primary: true, action: start },
      { label: "Continue here", action: start }
    ]);
  });
}

/* ASK */

function ask() {
  addMsg("Ask anything 😊");
}

/* INIT */

start();

</script>

</body>
</html>
